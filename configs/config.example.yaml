# kradar config
include_prerelease: false

chart_sources:
  - name: bitnami
    type: helm_index
    url: https://charts.bitnami.com/bitnami
    charts: ["*"]
    priority: 10

  - name: ingress-nginx
    type: helm_index
    url: https://kubernetes.github.io/ingress-nginx
    charts: ["ingress-nginx", "nginx-ingress"]
    priority: 50

  - name: prometheus-community
    type: helm_index
    url: https://prometheus-community.github.io/helm-charts
    charts: ["*"]
    priority: 10

  - name: grafana
    type: helm_index
    url: https://grafana.github.io/helm-charts
    charts: ["*"]
    priority: 10

